<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, "Segoe UI", Arial, sans-serif;
        width: 240px;
        margin: 0;
        padding: 14px;
        background: #fff;
        color: #1a1a1a;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      #status {
        font-size: 13px;
        color: #555;
        margin-bottom: 12px;
        min-height: 18px;
      }
      #status.active {
        color: #198754;
        font-weight: 600;
      }
      button {
        width: 100%;
        font-size: 14px;
        font-weight: 600;
        padding: 9px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #fff;
        background: #5b4ce3;
      }
      button.stop {
        background: #dc3545;
      }
      button:disabled {
        background: #bbb;
        cursor: default;
      }
      #options-link {
        display: block;
        margin-top: 12px;
        font-size: 12px;
        color: #5b4ce3;
        text-decoration: none;
        text-align: center;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>כתוביות עברית ל-Moodle</h1>
    <div id="status">בודק…</div>
    <button id="toggle" disabled>▶ הפעל כתוביות</button>
    <a id="options-link">⚙️ הגדרות</a>
    <script src="popup.js"></script>
  </body>
</html>
