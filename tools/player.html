<!DOCTYPE html>
<!--
  player.html — נגן מקומי פשוט לצפייה בהרצאה עם כתוביות עברית מסונכרנות.
  אין צורך בהתקנה ובלי אינטרנט: פותחים את הקובץ בדפדפן, בוחרים את קובץ הסרטון
  ואת קובץ ה-SRT (שנוצר ע"י backend/transcribe_to_srt.py), וצופים.
  הכל מקומי — שום קובץ לא עולה לשום מקום.
-->
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>נגן הרצאות עם כתוביות עברית</title>
    <style>
      body {
        font-family: system-ui, "Segoe UI", Arial, sans-serif;
        background: #1c1c1e;
        color: #eee;
        margin: 0;
        padding: 20px;
      }
      h1 { font-size: 18px; }
      .pickers { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
      .pickers label { font-size: 14px; display: block; margin-bottom: 4px; color: #bbb; }
      #stage { position: relative; max-width: 1000px; margin: 0 auto; background: #000; border-radius: 8px; overflow: hidden; }
      video { width: 100%; display: block; }
      #subs {
        position: absolute;
        bottom: 6%;
        left: 50%;
        transform: translateX(-50%);
        max-width: 90%;
        text-align: center;
        direction: rtl;
        background: rgba(0, 0, 0, 0.72);
        color: #fff;
        font-size: 28px;
        font-weight: 600;
        line-height: 1.35;
        padding: 4px 14px;
        border-radius: 8px;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
        pointer-events: none;
        white-space: pre-wrap;
      }
      #subs:empty { display: none; }
      .hint { color: #888; font-size: 13px; margin-top: 14px; text-align: center; }
      input[type="range"] { vertical-align: middle; }
      #size { width: 140px; }
    </style>
  </head>
  <body>
    <h1>🎬 נגן הרצאות עם כתוביות עברית</h1>
    <div class="pickers">
      <div>
        <label>קובץ הסרטון (mp4/mkv/webm)</label>
        <input id="videoFile" type="file" accept="video/*" />
      </div>
      <div>
        <label>קובץ הכתוביות (.srt)</label>
        <input id="srtFile" type="file" accept=".srt" />
      </div>
      <div>
        <label>גודל כתוביות</label>
        <input id="size" type="range" min="16" max="48" value="28" />
      </div>
    </div>

    <div id="stage">
      <video id="video" controls></video>
      <div id="subs"></div>
    </div>

    <div class="hint">בוחרים את שני הקבצים → הסרטון מתנגן והכתוביות מופיעות מסונכרנות. הכל מקומי במחשב שלך.</div>

    <script>
      const video = document.getElementById('video');
      const subs = document.getElementById('subs');
      let cues = []; // { start, end, text }

      document.getElementById('videoFile').addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (f) video.src = URL.createObjectURL(f);
      });

      document.getElementById('srtFile').addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = () => { cues = parseSRT(reader.result); };
        reader.readAsText(f, 'utf-8');
      });

      document.getElementById('size').addEventListener('input', (e) => {
        subs.style.fontSize = e.target.value + 'px';
      });

      // המרת "HH:MM:SS,mmm" לשניות
      function toSec(t) {
        const m = t.trim().match(/(\d+):(\d+):(\d+)[,.](\d+)/);
        if (!m) return 0;
        return +m[1] * 3600 + +m[2] * 60 + +m[3] + +m[4] / 1000;
      }

      function parseSRT(text) {
        const blocks = text.replace(/\r/g, '').split(/\n\n+/);
        const out = [];
        for (const b of blocks) {
          const lines = b.split('\n').filter((l) => l.trim() !== '');
          if (lines.length < 2) continue;
          const timeLine = lines.find((l) => l.includes('-->'));
          if (!timeLine) continue;
          const [a, z] = timeLine.split('-->');
          const idx = lines.indexOf(timeLine);
          const txt = lines.slice(idx + 1).join('\n');
          out.push({ start: toSec(a), end: toSec(z), text: txt });
        }
        return out;
      }

      // סנכרון: בכל עדכון זמן, הצג את הכתובית שמתאימה לזמן הנוכחי
      video.addEventListener('timeupdate', () => {
        const t = video.currentTime;
        const cue = cues.find((c) => t >= c.start && t <= c.end);
        subs.textContent = cue ? cue.text : '';
      });
    </script>
  </body>
</html>
