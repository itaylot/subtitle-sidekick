<!DOCTYPE html>
<!--
  ui-mock.html — Harness לבדיקת שכבת ה-UI (content.js) בלי שאר הפייפליין.
  פותחים בדפדפן (קובץ מקומי). מדמה chrome API ומזריק הודעות SHOW_SUBTITLE / CAPTURE_STATE
  בדיוק לפי חוזה A — כך בודקים את ה-overlay והכפתור בלי tabCapture ובלי backend.
-->
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>UI Mock — Moodle Hebrew Subtitles</title>
    <link rel="stylesheet" href="../extension/subtitles.css" />
    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 0; background: #222; }
      #fakeplayer { width: 720px; max-width: 90vw; margin: 40px auto; }
      video { width: 100%; height: 405px; background: #000; border-radius: 8px; }
      #panel {
        position: fixed; top: 10px; left: 10px; z-index: 99999;
        background: #fff; padding: 12px; border-radius: 8px; direction: rtl;
        font-size: 13px; box-shadow: 0 2px 10px rgba(0,0,0,.4); max-width: 280px;
      }
      #panel button { display: inline-block; margin: 3px; padding: 6px 8px; cursor: pointer; }
      #log { margin-top: 8px; font-family: monospace; font-size: 11px; color: #333; max-height: 120px; overflow: auto; }
    </style>
  </head>
  <body>
    <div id="panel">
      <b>UI Mock — הזרקת הודעות (חוזה A)</b>
      <div>
        <button data-act="partial">partial (אפור)</button>
        <button data-act="final">final (לבן)</button>
      </div>
      <div>
        <button data-act="state-on">CAPTURE_STATE on</button>
        <button data-act="state-off">CAPTURE_STATE off</button>
      </div>
      <div id="log"></div>
    </div>

    <div id="fakeplayer">
      <video poster="" muted></video>
    </div>

    <script>
      // ── chrome API מדומה ──────────────────────────────────
      const listeners = [];
      const store = { fontSize: 28, position: 'bottom' };
      const logEl = () => document.getElementById('log');
      function log(s) {
        const d = document.createElement('div');
        d.textContent = s;
        logEl().prepend(d);
      }
      window.chrome = {
        runtime: {
          onMessage: { addListener: (fn) => listeners.push(fn) },
          sendMessage: (msg, cb) => {
            log('→ SW: ' + JSON.stringify(msg));
            if (msg.type === 'GET_STATE' && cb) cb({ active: false, activeTabId: null });
          },
          openOptionsPage: () => log('openOptionsPage()'),
        },
        storage: {
          sync: {
            get: (keys, cb) => cb(store),
            set: (vals, cb) => { Object.assign(store, vals); cb && cb(); },
          },
          onChanged: { addListener: () => {} },
        },
      };
      function dispatch(msg) {
        listeners.forEach((fn) => fn(msg));
      }

      const samples = ['שלום לכולם', 'שלום לכולם וברוכים', 'שלום לכולם וברוכים הבאים להרצאה'];
      let i = 0;
      document.getElementById('panel').addEventListener('click', (e) => {
        const act = e.target.dataset.act;
        if (act === 'partial') dispatch({ type: 'SHOW_SUBTITLE', text: samples[i++ % samples.length], isFinal: false });
        else if (act === 'final') dispatch({ type: 'SHOW_SUBTITLE', text: 'שלום לכולם וברוכים הבאים להרצאה.', isFinal: true });
        else if (act === 'state-on') dispatch({ type: 'CAPTURE_STATE', active: true });
        else if (act === 'state-off') dispatch({ type: 'CAPTURE_STATE', active: false });
      });
    </script>
    <!-- טוען את ה-content.js האמיתי -->
    <script src="../extension/content.js"></script>
  </body>
</html>
